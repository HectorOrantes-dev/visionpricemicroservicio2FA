      <tr>
        <td align="center">
          <table width="480" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06);">

              <td style="background-color:#4f46e5;padding:24px;text-align:center;">

            <tr>
              <td style="padding:32px;text-align:center;">
                <h2 style="color:#111827;margin:0 0 12px;font-size:18px;">Verificación en dos pasos</h2>

                  <span style="font-size:32px;letter-spacing:8px;font-weight:bold;color:#111827;">{{code}}</span>

              </td>
            </tr>
            <tr>
              <td style="padding:16px 32px 28px;text-align:center;">
                <p style="color:#9ca3af;margin:0;font-size:12px;">

                </p>
